<div class="space-y-6">
  <!-- Header -->
  <h2 class="text-2xl font-bold text-text-dark">اللوجستيات والنقل</h2>

  <!-- Services Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let service of services" class="card p-6 hover:shadow-soft-lg transition-all duration-300">
      <div class="mb-4">
        <h3 class="text-xl font-bold text-text-dark mb-2">{{ service.title }}</h3>
        <p class="text-gray-600 mb-2">{{ service.description }}</p>
        <p class="text-gray-500 text-sm mb-4">مقدم الخدمة: {{ service.provider }}</p>
      </div>
      <div class="space-y-2 mb-4">
        <div class="flex justify-between">
          <span class="text-gray-600">السعر:</span>
          <span class="text-primary-green font-bold">{{ service.pricePerKm || service.pricePerMonth || service.pricePerContainer }}</span>
        </div>
        <div class="flex justify-between">
          <span class="text-gray-600">السعة:</span>
          <span class="text-text-dark">{{ service.capacity }}</span>
        </div>
      </div>
      <button
        (click)="requestQuote(service.id)"
        class="w-full btn-primary"
      >
        طلب عرض سعر
      </button>
    </div>
  </div>
</div>
