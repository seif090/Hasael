<div class="space-y-6">
  <!-- Header with CTA -->
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-text-dark">الآلات والمعدات الزراعية</h2>
    <button class="btn-primary">+ إضافة معلن</button>
  </div>

  <!-- Equipment Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let item of equipment" class="card overflow-hidden hover:shadow-soft-lg transition-all duration-300 hover:-translate-y-2 group">
      <div class="relative h-48 overflow-hidden">
        <img [src]="item.image" [alt]="item.name" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        <div class="absolute top-4 right-4 bg-primary-gold text-white px-3 py-1 rounded-full text-sm font-bold">
          {{ item.type }}
        </div>
      </div>
      <div class="p-6">
        <h3 class="text-xl font-bold text-text-dark mb-2">{{ item.name }}</h3>
        <div class="flex items-center gap-2 text-gray-600 mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <span>{{ item.location }}</span>
        </div>
        <p class="text-primary-green font-bold text-2xl mb-4">{{ item.price }}</p>
        <button
          (click)="contactSeller(item.id)"
          class="w-full btn-secondary"
        >
          التواصل مع البائع
        </button>
      </div>
    </div>
  </div>
</div>
