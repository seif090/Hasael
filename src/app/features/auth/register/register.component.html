<div class="min-h-screen bg-background-light flex items-center justify-center p-4 md:p-8">
  <div class="w-full max-w-6xl bg-white rounded-30 shadow-soft-lg overflow-hidden flex flex-col lg:flex-row">
    
    <!-- Left Side - Form -->
    <div class="w-full lg:w-1/2 p-8 md:p-12 lg:p-16">
      <!-- Logo -->
      <div class="mb-8">
        <h1 class="text-3xl md:text-4xl font-bold text-primary-green">حصائل</h1>
      </div>
      
      <!-- Title -->
      <h2 class="text-2xl md:text-3xl font-bold text-text-dark mb-2">
        إنشاء حساب جديد
      </h2>
      <p class="text-gray-600 mb-8">
        ابدأ رحلتك الاستثمارية في الزراعة
      </p>
      
      <!-- Form -->
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-5">
        <!-- Full Name -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">الاسم الكامل</label>
          <div class="relative">
            <input
              type="text"
              formControlName="fullName"
              placeholder="أدخل اسمك الكامل"
              class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300 pl-12"
            />
            <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
            </div>
          </div>
        </div>
        
        <!-- Email -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">البريد الإلكتروني</label>
          <div class="relative">
            <input
              type="email"
              formControlName="email"
              placeholder="أدخل بريدك الإلكتروني"
              class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300 pl-12"
            />
            <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                <polyline points="22,6 12,13 2,6"></polyline>
              </svg>
            </div>
          </div>
        </div>
        
        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">رقم الهاتف</label>
          <div class="relative">
            <input
              type="tel"
              formControlName="phone"
              placeholder="أدخل رقم هاتفك"
              class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300 pl-12"
            />
            <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
              </svg>
            </div>
          </div>
        </div>
        
        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">كلمة المرور</label>
          <div class="relative">
            <input
              type="password"
              formControlName="password"
              placeholder="أنشئ كلمة مرور قوية"
              class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300 pl-12"
            />
            <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>
        </div>
        
        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">تأكيد كلمة المرور</label>
          <div class="relative">
            <input
              type="password"
              formControlName="confirmPassword"
              placeholder="أعد إدخال كلمة المرور"
              class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300 pl-12"
            />
            <div class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-400">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
              </svg>
            </div>
          </div>
        </div>
        
        <!-- Submit Button -->
        <button
          type="submit"
          [disabled]="registerForm.invalid"
          class="w-full bg-primary-green text-white py-4 rounded-20 font-bold text-lg hover:opacity-90 transition-all duration-300 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          تسجيل
        </button>
        
        <!-- Google Button -->
        <button
          type="button"
          (click)="loginWithGoogle()"
          [disabled]="isLoading"
          class="w-full bg-white border-2 border-gray-300 text-gray-700 py-4 rounded-20 font-bold text-lg hover:border-primary-green hover:text-primary-green transition-all duration-300 flex items-center justify-center gap-3 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          التسجيل باستخدام Google
        </button>
        
        <!-- Login Link -->
        <p class="text-center text-gray-600 mt-6">
          لديك حساب بالفعل؟
          <a routerLink="/login" class="text-primary-green font-bold hover:underline">تسجيل الدخول</a>
        </p>
      </form>
    </div>
    
    <!-- Right Side - Image -->
    <div class="w-full lg:w-1/2 relative min-h-[400px] lg:min-h-auto">
      <div class="absolute inset-0 bg-cover bg-center" style="background-image: url('https://images.unsplash.com/photo-1625246333195-78d9c38ad449?ixlib=rb-4.0.3&auto=format&fit=crop&w=1000&q=80');">
        <div class="absolute inset-0 bg-primary-green/70 rounded-tr-30 rounded-br-30"></div>
        <div class="absolute inset-0 flex items-center justify-center p-8 md:p-12">
          <div class="text-center text-white">
            <h3 class="text-3xl md:text-4xl lg:text-5xl font-bold mb-4">
              استثمر في الزراعة
            </h3>
            <p class="text-2xl md:text-3xl lg:text-4xl font-bold mb-6" style="color: #D4A62A;">
              بثقة وشفافية
            </p>
            <p class="text-lg md:text-xl lg:text-2xl opacity-90 max-w-lg mx-auto">
              نربط بين المستثمرين وأصحاب المزارع لتحقيق نمو مستدام معًا
            </p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
