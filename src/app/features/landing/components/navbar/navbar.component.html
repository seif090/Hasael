<nav class="sticky top-0 z-50 bg-white/95 backdrop-blur-md shadow-soft">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between items-center h-20">
      <!-- Logo -->
      <div class="flex-shrink-0">
        <a routerLink="/landing" class="flex items-center gap-3 hover:opacity-90 transition-opacity">
          <img src="assets/images/logo.png" alt="HASAEL Logo" class="h-10 w-auto">
        </a>
      </div>

      <!-- Desktop Navigation -->
      <div class="hidden lg:flex items-center space-x-8 space-x-reverse">
        <a routerLink="/landing"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">الرئيسية</a>
        <a routerLink="/marketplace-investment"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">السوق الاستثماري</a>
        <a routerLink="/marketplace-services"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">الخدمات الزراعية</a>
        <a href="#opportunities" class="text-gray-700 hover:text-primary-green font-medium transition-colors">فرص
          الاستثمار</a>
        <a href="#how-it-works" class="text-gray-700 hover:text-primary-green font-medium transition-colors">كيف
          نعمل</a>
        <a routerLink="/dashboard" class="text-gray-700 hover:text-primary-green font-medium transition-colors">لوحة
          التحكم</a>
      </div>

      <!-- Desktop CTA Buttons -->
      <div class="hidden lg:flex items-center gap-4">
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/login" class="btn-secondary">تسجيل الدخول</a>
          <a routerLink="/register" class="btn-primary">تسجيل</a>
        </ng-container>
        <ng-container *ngIf="isLoggedIn">
          <span class="text-gray-700 font-medium">{{ currentUser?.fullName }}</span>
          <button (click)="logout()" class="btn-secondary">تسجيل الخروج</button>
        </ng-container>
      </div>

      <!-- Mobile Menu Button -->
      <div class="lg:hidden">
        <button (click)="toggleMobileMenu()" class="text-gray-700 hover:text-primary-green focus:outline-none">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMobileMenuOpen" class="lg:hidden pb-4">
      <div class="flex flex-col space-y-4 space-y-reverse">
        <a routerLink="/landing" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">الرئيسية</a>
        <a routerLink="/marketplace-investment" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">السوق الاستثماري</a>
        <a routerLink="/marketplace-services" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">الخدمات الزراعية</a>
        <a href="#opportunities" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">فرص الاستثمار</a>
        <a href="#how-it-works" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">كيف نعمل</a>
        <a routerLink="/dashboard" (click)="closeMobileMenu()"
          class="text-gray-700 hover:text-primary-green font-medium transition-colors">لوحة التحكم</a>
        <ng-container *ngIf="!isLoggedIn">
          <a routerLink="/login" (click)="closeMobileMenu()" class="btn-secondary text-center">تسجيل الدخول</a>
          <a routerLink="/register" (click)="closeMobileMenu()" class="btn-primary text-center">تسجيل</a>
        </ng-container>
        <ng-container *ngIf="isLoggedIn">
          <span class="text-gray-700 font-medium text-center">{{ currentUser?.fullName }}</span>
          <button (click)="logout()" class="btn-secondary text-center">تسجيل الخروج</button>
        </ng-container>
      </div>
    </div>
  </div>
</nav>
