<section class="py-20 bg-background-light">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div *ngFor="let stat of statistics" class="card p-8 text-center hover:shadow-soft-lg transition-shadow duration-300">
        <div class="mb-4 flex justify-center">
          <div class="w-16 h-16 rounded-full bg-primary-green/10 flex items-center justify-center">
            <svg *ngIf="stat.icon === 'users'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path>
              <circle cx="9" cy="7" r="4"></circle>
              <path d="M23 21v-2a4 4 0 0 0-3-3.87"></path>
              <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
            </svg>
            <svg *ngIf="stat.icon === 'tractor'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4A62A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"></path>
              <path d="M15 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"></path>
              <path d="M5 17h-2v-6l2-5h9l4 5h6a2 2 0 0 1 2 2v4h-2"></path>
              <path d="M3 17v-4h9"></path>
            </svg>
            <svg *ngIf="stat.icon === 'leaf'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8 0 5.5-4.77 10-10 10Z"></path>
              <path d="M2 21c0-3 1.85-5.36 5.08-6C9.5 14.52 12 13 13 12"></path>
            </svg>
            <svg *ngIf="stat.icon === 'star'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#D4A62A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
            </svg>
          </div>
        </div>
        <h3 class="text-4xl md:text-5xl font-bold text-primary-green mb-2">{{ stat.number }}</h3>
        <p class="text-gray-600 text-lg">{{ stat.label }}</p>
      </div>
    </div>
  </div>
</section>
