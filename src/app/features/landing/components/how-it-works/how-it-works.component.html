<section id="how-it-works" class="py-20 bg-background-light">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl lg:text-5xl font-bold text-text-dark mb-4">
        كيف نعمل
      </h2>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto">
        خطوات بسيطة للبدء في رحلتك الاستثمارية
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
      <div *ngFor="let step of steps" class="card p-8 text-center hover:shadow-soft-lg transition-shadow duration-300 relative">
        <div class="absolute top-4 left-4 text-6xl font-bold text-primary-green/10">{{ step.number }}</div>
        <div class="mb-6 flex justify-center">
          <div class="w-20 h-20 rounded-full bg-primary-green/10 flex items-center justify-center">
            <svg *ngIf="step.icon === 'search'" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"></circle>
              <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
            </svg>
            <svg *ngIf="step.icon === 'trending-up'" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline>
              <polyline points="17 6 23 6 23 12"></polyline>
            </svg>
            <svg *ngIf="step.icon === 'activity'" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline>
            </svg>
            <svg *ngIf="step.icon === 'check-circle'" xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
              <polyline points="22 4 12 14.01 9 11.01"></polyline>
            </svg>
          </div>
        </div>
        <h3 class="text-xl font-bold text-text-dark mb-3">{{ step.title }}</h3>
        <p class="text-gray-600">{{ step.description }}</p>
      </div>
    </div>
  </div>
</section>
