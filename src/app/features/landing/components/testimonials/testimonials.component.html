<section class="py-20 bg-white">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="text-center mb-16">
      <h2 class="text-3xl md:text-4xl lg:text-5xl font-bold text-text-dark mb-4">
        آراء المستثمرين
      </h2>
      <p class="text-gray-600 text-lg max-w-2xl mx-auto">
        ماذا يقول مستثمرونا عن تجربتهم مع حصائل
      </p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <div *ngFor="let testimonial of testimonials" class="card p-8 hover:shadow-soft-lg transition-shadow duration-300">
        <div class="flex items-center gap-1 mb-4">
          <svg *ngFor="let star of [].constructor(testimonial.rating)" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="#D4A62A" stroke="none">
            <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
          </svg>
        </div>
        <p class="text-gray-700 mb-6 leading-relaxed">"{{ testimonial.text }}"</p>
        <div class="flex items-center gap-4">
          <img [src]="testimonial.image" [alt]="testimonial.name" class="w-12 h-12 rounded-full object-cover">
          <div>
            <h4 class="font-bold text-text-dark">{{ testimonial.name }}</h4>
            <p class="text-gray-600 text-sm">مستثمر</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
