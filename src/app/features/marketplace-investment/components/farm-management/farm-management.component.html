<div class="space-y-6">
  <!-- Header -->
  <h2 class="text-2xl font-bold text-text-dark">خدمات إدارة المزارع</h2>

  <!-- Services Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let service of services" class="card p-6 hover:shadow-soft-lg transition-all duration-300">
      <div class="mb-4 flex justify-center">
        <div class="w-16 h-16 rounded-full bg-primary-green/10 flex items-center justify-center">
          <svg *ngIf="service.icon === 'tractor'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"></path>
            <path d="M15 17a2 2 0 1 0 4 0a2 2 0 1 0-4 0"></path>
            <path d="M5 17h-2v-6l2-5h9l4 5h6a2 2 0 0 1 2 2v4h-2"></path>
            <path d="M3 17v-4h9"></path>
          </svg>
          <svg *ngIf="service.icon === 'eye'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <svg *ngIf="service.icon === 'calendar'" xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#0F5C4D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
            <line x1="16" y1="2" x2="16" y2="6"></line>
            <line x1="8" y1="2" x2="8" y2="6"></line>
            <line x1="3" y1="10" x2="21" y2="10"></line>
          </svg>
        </div>
      </div>
      <h3 class="text-xl font-bold text-text-dark mb-2 text-center">{{ service.title }}</h3>
      <p class="text-gray-600 text-center mb-4">{{ service.description }}</p>
      <p class="text-primary-green font-bold text-center mb-4">{{ service.price }}</p>
      <button
        (click)="requestService()"
        class="w-full btn-primary"
      >
        طلب الخدمة
      </button>
    </div>
  </div>
</div>
