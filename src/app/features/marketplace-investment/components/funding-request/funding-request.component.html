<div class="space-y-6">
  <!-- Header -->
  <h2 class="text-2xl font-bold text-text-dark">طلب تمويل أو خبرة</h2>

  <!-- Request Type Tabs -->
  <div class="flex gap-4">
    <button (click)="setRequestType('funding')"
      [class]="requestType === 'funding' ? 'bg-primary-green text-white' : 'bg-white text-gray-700 border border-gray-300'"
      class="flex-1 py-3 rounded-20 font-bold transition-all duration-300">
      طلب تمويل
    </button>
    <button (click)="setRequestType('expertise')"
      [class]="requestType === 'expertise' ? 'bg-primary-green text-white' : 'bg-white text-gray-700 border border-gray-300'"
      class="flex-1 py-3 rounded-20 font-bold transition-all duration-300">
      طلب خبرة
    </button>
  </div>

  <!-- Funding Form -->
  <div *ngIf="requestType === 'funding'" class="card p-6">
    <h3 class="text-xl font-bold text-text-dark mb-6">طلب تمويل للمشروع</h3>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">اسم المشروع</label>
        <input type="text" [(ngModel)]="fundingForm.title" placeholder="أدخل اسم المشروع"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">الفئة</label>
        <select [(ngModel)]="fundingForm.category"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
          <option *ngFor="let cat of categories" [value]="cat.value">{{ cat.label }}</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">المبلغ المطلوب (ريال)</label>
        <input type="number" [(ngModel)]="fundingForm.targetAmount" placeholder="أدخل المبلغ المطلوب"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">المدة (شهور)</label>
        <input type="number" [(ngModel)]="fundingForm.duration" placeholder="أدخل المدة"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">الموقع</label>
        <input type="text" [(ngModel)]="fundingForm.location" placeholder="أدخل موقع المشروع"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">وصف المشروع</label>
        <textarea [(ngModel)]="fundingForm.description" rows="4" placeholder="اكتب وصفاً مفصلاً للمشروع"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300"></textarea>
      </div>
      <button type="button" (click)="submitRequest()" class="w-full btn-primary" [disabled]="submitting">
        {{ submitting ? 'جاري الإرسال...' : 'إرسال الطلب' }}
      </button>
    </form>
  </div>

  <!-- Expertise Form -->
  <div *ngIf="requestType === 'expertise'" class="card p-6">
    <h3 class="text-xl font-bold text-text-dark mb-6">طلب خبرة واستشارة</h3>
    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">نوع الخبرة المطلوبة</label>
        <select
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
          <option value="">اختر نوع الخبرة</option>
          <option value="crop">خبرة زراعية</option>
          <option value="management">إدارة مشاريع</option>
          <option value="financial">استشارات مالية</option>
          <option value="technical">استشارات تقنية</option>
        </select>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">وصف المشكلة أو الاستفسار</label>
        <textarea rows="4" placeholder="اكتب وصفاً مفصلاً للاستفسار"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300"></textarea>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">الميزانية المتاحة</label>
        <input type="text" placeholder="أدخل الميزانية المتاحة"
          class="input-field w-full px-4 py-3 rounded-20 border border-gray-300 focus:border-primary-green focus:ring-2 focus:ring-primary-green/20 outline-none transition-all duration-300">
      </div>
      <button type="button" (click)="submitRequest()" class="w-full btn-primary">
        إرسال الطلب
      </button>
    </form>
  </div>
</div>
