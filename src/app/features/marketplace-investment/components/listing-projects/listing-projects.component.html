<div class="space-y-6">
  <!-- Header with CTA -->
  <div class="flex justify-between items-center">
    <h2 class="text-2xl font-bold text-text-dark">الأراضي والمشاريع المعروضة</h2>
    <button
      (click)="listNewProject()"
      class="btn-primary"
    >
      + إضافة مشروع جديد
    </button>
  </div>

  <!-- Projects Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let project of projects" class="card overflow-hidden hover:shadow-soft-lg transition-all duration-300 hover:-translate-y-2 group">
      <div class="relative h-48 overflow-hidden">
        <img [src]="project.image" [alt]="project.title" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500">
        <div class="absolute top-4 right-4 bg-primary-gold text-white px-3 py-1 rounded-full text-sm font-bold">
          {{ project.status }}
        </div>
      </div>
      <div class="p-6">
        <h3 class="text-xl font-bold text-text-dark mb-2">{{ project.title }}</h3>
        <div class="space-y-2 text-gray-600 mb-4">
          <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
              <circle cx="12" cy="10" r="3"></circle>
            </svg>
            <span>{{ project.location }}</span>
          </div>
          <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 3v18h18"></path>
              <path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"></path>
            </svg>
            <span>{{ project.area }}</span>
          </div>
        </div>
        <div class="grid grid-cols-2 gap-3 mb-4">
          <div class="bg-background-light rounded-20 p-3 text-center">
            <p class="text-primary-green font-bold">{{ project.investmentRequired }}</p>
            <p class="text-gray-600 text-sm">التمويل المطلوب</p>
          </div>
          <div class="bg-background-light rounded-20 p-3 text-center">
            <p class="text-primary-green font-bold">{{ project.expectedReturn }}</p>
            <p class="text-gray-600 text-sm">العائد المتوقع</p>
          </div>
        </div>
        <button class="w-full btn-secondary">
          عرض التفاصيل
        </button>
      </div>
    </div>
  </div>
</div>
